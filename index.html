<!DOCTYPE html>
<html lang="es">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barraca Ellauri</title>
  <style>

    header h1 { margin:0; }
    .container { padding:20px; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px; }
    .card { background:white; border-radius:12px; padding:15px; box-shadow:0 3px 8px rgba(0,0,0,0.1); }
    .card img { width:100%; height:160px; object-fit:cover; border-radius:8px; }
    .card h3 { margin:10px 0 5px; }
    .btn { display:block; text-align:center; background:#ff6600; color:white; padding:10px; border-radius:6px; text-decoration:none; margin-top:10px; }
    footer { text-align:center; padding:15px; background:#222; color:white; margin-top:20px; }
  </style>
</head>
<body>

<header>
  <h1>Barraca Ellauri</h1>
  <p>Todo para tu obra en Montevideo</p>
</header>

<div class="container">
  <h2>Productos</h2>
  <div class="grid">

      <h3>Arena terciada fina</h3>
      <p>Suelta o en bolsa</p>
      <a class="btn" href="https://wa.me/59897124015?text=Hola%20quiero%20consultar%20por%20Arena%20fina">Consultar</a>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/300x160" alt="Portland">

    </div>

  </div>
  <div class="card">
  <img src="https://via.placeholder.com/300x160" alt="Arena gruesa">
  <h3>Arena gruesa</h3>
  <p>Ideal para mezcla y hormigón</p>
  <a class="btn" href="https://wa.me/59897124015?text=Hola%20quiero%20consultar%20por%20Arena%20gruesa">Consultar</a>
</div>
</div>

<footer>
  <p>© 2026 Barraca Ellauri - Envíos en Montevideo</p>
</footer>

</body>
</html>
